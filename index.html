<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URSA IPA | UDID</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient-bg">
        <div class="blob color-amber"></div>
        <div class="blob color-sapphire"></div>
        <div class="blob color-violet"></div>
    </div>
    
    <div class="card">
        <div class="logo-wrapper">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <path class="bear-hop" d="M50 10 C 35 10, 25 25, 25 40 C 25 55, 35 60, 40 65 L 40 75 C 40 80, 45 85, 50 85 C 55 85, 60 80, 60 75 L 60 65 C 65 60, 75 55, 75 40 C 75 25, 65 10, 50 10 Z M 45 35 A 5 5 0 1 1 55 35 A 5 5 0 1 1 45 35 Z M 50 45 L 50 60 M 40 50 L 60 50" stroke="url(#goldGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
            </svg>
        </div>
        
        <div class="brand">URSA IPA</div>
        <h1>Твой UDID</h1>
        <p>Установи конфигурационный профиль в настройках устройства.</p>
        
        <a href="https://488e-195-64-239-64.ngrok-free.app/enroll" class="btn">Получить профиль</a>
        
        <div id="result" class="hidden">
            <div class="udid-wrapper">
                <code id="udid-display"></code>
            </div>
            <button id="copy-btn" class="btn secondary">Скопировать</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
